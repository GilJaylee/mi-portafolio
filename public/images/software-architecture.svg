<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">

  <!-- ── LAYER LABELS (left side) ── -->
  <text x="22" y="88"  font-family="monospace" font-size="7" fill="#ffffff" opacity="0.3" letter-spacing="2">CLIENT</text>
  <text x="22" y="98"  font-family="monospace" font-size="7" fill="#ffffff" opacity="0.3" letter-spacing="2">LAYER</text>
  <text x="22" y="210" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.3" letter-spacing="2">BACKEND</text>
  <text x="22" y="220" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.3" letter-spacing="2">LAYER</text>
  <text x="22" y="335" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.3" letter-spacing="2">DATA</text>
  <text x="22" y="345" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.3" letter-spacing="2">LAYER</text>

  <!-- Layer bracket lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.15">
    <line x1="18" y1="46"  x2="18" y2="130"/>
    <line x1="18" y1="46"  x2="22" y2="46"/>
    <line x1="18" y1="130" x2="22" y2="130"/>
    <line x1="18" y1="165" x2="18" y2="255"/>
    <line x1="18" y1="165" x2="22" y2="165"/>
    <line x1="18" y1="255" x2="22" y2="255"/>
    <line x1="18" y1="285" x2="18" y2="375"/>
    <line x1="18" y1="285" x2="22" y2="285"/>
    <line x1="18" y1="375" x2="22" y2="375"/>
  </g>

  <!-- ── CLIENT LAYER ── -->

  <!-- WEB box -->
  <rect x="115" y="46" width="135" height="80" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="115" y1="62" x2="250" y2="62" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="182" y="58"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">CLIENT</text>
  <text x="182" y="82"  font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">WEB</text>
  <text x="182" y="98"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">React / Next.js</text>
  <text x="182" y="112" font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.25">browser</text>

  <!-- MOBILE box -->
  <rect x="332" y="46" width="135" height="80" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="332" y1="62" x2="467" y2="62" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="399" y="58"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">CLIENT</text>
  <text x="399" y="82"  font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">MOBILE</text>
  <text x="399" y="98"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">React Native</text>
  <text x="399" y="112" font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.25">iOS / Android</text>

  <!-- ADMIN box -->
  <rect x="548" y="46" width="135" height="80" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="548" y1="62" x2="683" y2="62" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="615" y="58"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">CLIENT</text>
  <text x="615" y="82"  font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">ADMIN</text>
  <text x="615" y="98"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">Dashboard</text>
  <text x="615" y="112" font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.25">internal</text>

  <!-- Arrows CLIENT → BACKEND -->
  <g stroke="#ffffff" stroke-width="0.75" opacity="0.5">
    <line x1="182" y1="126" x2="182" y2="158"/>
    <polyline points="176,154 182,162 188,154" fill="none"/>
    <line x1="399" y1="126" x2="399" y2="158"/>
    <polyline points="393,154 399,162 405,154" fill="none"/>
    <line x1="615" y1="126" x2="615" y2="158"/>
    <polyline points="609,154 615,162 621,154" fill="none"/>
  </g>

  <!-- HTTP label on middle arrow -->
  <text x="410" y="145" font-family="monospace" font-size="6" fill="#ffffff" opacity="0.3">HTTP/REST</text>

  <!-- ── BACKEND LAYER ── -->

  <rect x="115" y="165" width="568" height="85" stroke="#ffffff" stroke-width="1" fill="none"/>
  <line x1="115" y1="181" x2="683" y2="181" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="399" y="177" font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">BACKEND</text>
  <text x="399" y="210" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle">API REST</text>
  <text x="399" y="228" font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">Node.js · Express · JWT Auth · Rate Limiting</text>
  <text x="399" y="242" font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.2">PORT 3001</text>

  <!-- Internal endpoint docs inside backend box -->
  <g opacity="0.2">
    <text x="140" y="198" font-family="monospace" font-size="5.5" fill="#ffffff">GET /api/users</text>
    <text x="140" y="210" font-family="monospace" font-size="5.5" fill="#ffffff">POST /api/auth</text>
    <text x="140" y="222" font-family="monospace" font-size="5.5" fill="#ffffff">PUT /api/orders</text>
    <text x="590" y="198" font-family="monospace" font-size="5.5" fill="#ffffff" text-anchor="end">middleware()</text>
    <text x="590" y="210" font-family="monospace" font-size="5.5" fill="#ffffff" text-anchor="end">validate()</text>
    <text x="590" y="222" font-family="monospace" font-size="5.5" fill="#ffffff" text-anchor="end">respond()</text>
  </g>

  <!-- Arrows BACKEND → DATA -->
  <g stroke="#ffffff" stroke-width="0.75" opacity="0.5">
    <line x1="182" y1="250" x2="182" y2="278"/>
    <polyline points="176,274 182,282 188,274" fill="none"/>
    <line x1="399" y1="250" x2="399" y2="278"/>
    <polyline points="393,274 399,282 405,274" fill="none"/>
    <line x1="615" y1="250" x2="615" y2="278"/>
    <polyline points="609,274 615,282 621,274" fill="none"/>
  </g>

  <!-- SQL/ORM label -->
  <text x="410" y="266" font-family="monospace" font-size="6" fill="#ffffff" opacity="0.3">SQL / ORM</text>

  <!-- ── DATA LAYER ── -->

  <!-- DATABASE box -->
  <rect x="115" y="285" width="135" height="85" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="115" y1="301" x2="250" y2="301" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="182" y="297"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">STORAGE</text>
  <text x="182" y="322"  font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">DATABASE</text>
  <text x="182" y="338"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">PostgreSQL</text>
  <text x="182" y="354"  font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.25">persistent</text>

  <!-- CACHE box -->
  <rect x="332" y="285" width="135" height="85" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="332" y1="301" x2="467" y2="301" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="399" y="297"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">STORAGE</text>
  <text x="399" y="322"  font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">CACHE</text>
  <text x="399" y="338"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">Redis</text>
  <text x="399" y="354"  font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.25">in-memory</text>

  <!-- STORAGE box -->
  <rect x="548" y="285" width="135" height="85" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="548" y1="301" x2="683" y2="301" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="615" y="297"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">STORAGE</text>
  <text x="615" y="322"  font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">STORAGE</text>
  <text x="615" y="338"  font-family="monospace" font-size="7"  fill="#ffffff" text-anchor="middle" opacity="0.4">S3 / GCS</text>
  <text x="615" y="354"  font-family="monospace" font-size="6"  fill="#ffffff" text-anchor="middle" opacity="0.25">blob / files</text>

</svg>
