<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">

  <!-- ── DESKTOP MONITOR ── -->

  <!-- Monitor outer bezel -->
  <rect x="22" y="28" width="310" height="218" rx="3" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.9"/>
  <!-- Screen area -->
  <rect x="32" y="38" width="290" height="198" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- Screen content: nav -->
  <line x1="32" y1="55" x2="322" y2="55" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <text x="52" y="50" font-family="monospace" font-size="6" fill="#ffffff" opacity="0.6">RESTAURANTE</text>
  <text x="244" y="50" font-family="monospace" font-size="5" fill="#ffffff" opacity="0.3">MENÚ RESERVAS CONTACTO</text>

  <!-- Screen content: hero -->
  <text x="177" y="95"  font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.3" letter-spacing="3">BIENVENIDOS</text>
  <text x="177" y="115" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.9">Reserva tu Mesa</text>
  <text x="177" y="131" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.3">Experiencia gastronómica única</text>
  <!-- CTA button -->
  <rect x="130" y="138" width="95" height="16" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.6"/>
  <text x="177" y="150" font-family="monospace" font-size="5.5" fill="#ffffff" text-anchor="middle" opacity="0.6">RESERVAR AHORA →</text>

  <!-- Screen content: 3 cards -->
  <line x1="32" y1="168" x2="322" y2="168" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <rect x="38"  y="174" width="82" height="52" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>
  <rect x="128" y="174" width="82" height="52" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>
  <rect x="218" y="174" width="82" height="52" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>
  <text x="79"  y="202" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.4">MENÚ</text>
  <text x="169" y="202" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.4">EVENTOS</text>
  <text x="259" y="202" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.4">TERRAZA</text>

  <!-- Monitor stand -->
  <line x1="177" y1="246" x2="177" y2="282" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- Stand base -->
  <line x1="130" y1="282" x2="224" y2="282" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="120" y1="282" x2="228" y2="282" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <!-- Trapezoid base detail -->
  <line x1="130" y1="276" x2="224" y2="276" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="130" y1="276" x2="130" y2="282" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="224" y1="276" x2="224" y2="282" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

  <!-- Label -->
  <text x="177" y="298" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35" letter-spacing="3">DESKTOP</text>

  <!-- ── TABLET ── -->

  <!-- Tablet outer -->
  <rect x="370" y="42" width="168" height="248" rx="8" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.9"/>
  <!-- Screen area -->
  <rect x="382" y="62" width="144" height="210" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Home button circle -->
  <circle cx="454" cy="276" r="8" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.5"/>
  <!-- Front camera dot -->
  <circle cx="454" cy="52" r="3" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Tablet screen content: nav -->
  <line x1="382" y1="76" x2="526" y2="76" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <text x="398" y="72" font-family="monospace" font-size="5.5" fill="#ffffff" opacity="0.6">RESTAURANTE</text>
  <text x="500" y="72" font-family="monospace" font-size="5" fill="#ffffff" opacity="0.3">≡</text>

  <!-- Tablet hero -->
  <text x="454" y="108" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.3" letter-spacing="2">BIENVENIDOS</text>
  <text x="454" y="126" font-family="monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Reserva</text>
  <text x="454" y="140" font-family="monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">tu Mesa</text>
  <text x="454" y="154" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.3">Gastronomía · CDMX</text>
  <!-- CTA -->
  <rect x="404" y="160" width="100" height="14" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.6"/>
  <text x="454" y="171" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.6">RESERVAR →</text>

  <!-- Tablet 2-column cards -->
  <line x1="382" y1="184" x2="526" y2="184" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <rect x="388" y="190" width="62" height="50" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>
  <rect x="460" y="190" width="62" height="50" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>
  <text x="419" y="218" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.4">MENÚ</text>
  <text x="491" y="218" font-family="monospace" font-size="5" fill="#ffffff" text-anchor="middle" opacity="0.4">EVENTOS</text>

  <!-- Label -->
  <text x="454" y="308" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35" letter-spacing="3">TABLET</text>

  <!-- ── MOBILE ── -->

  <!-- Mobile outer -->
  <rect x="600" y="62" width="90" height="192" rx="10" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.9"/>
  <!-- Screen area -->
  <rect x="609" y="82" width="72" height="154" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Home indicator bar -->
  <line x1="627" y1="246" x2="663" y2="246" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Notch / front camera -->
  <rect x="631" y="63" width="28" height="10" rx="4" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Mobile nav -->
  <line x1="609" y1="93" x2="681" y2="93" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <text x="620" y="91" font-family="monospace" font-size="4.5" fill="#ffffff" opacity="0.5">REST.</text>
  <text x="665" y="91" font-family="monospace" font-size="5" fill="#ffffff" opacity="0.3">≡</text>

  <!-- Mobile hero text (stacked) -->
  <text x="645" y="115" font-family="monospace" font-size="4" fill="#ffffff" text-anchor="middle" opacity="0.25" letter-spacing="1">BIENVENIDOS</text>
  <text x="645" y="132" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.9">Reserva</text>
  <text x="645" y="144" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.9">tu Mesa</text>
  <text x="645" y="157" font-family="monospace" font-size="4.5" fill="#ffffff" text-anchor="middle" opacity="0.3">Gastronomía · CDMX</text>
  <!-- CTA -->
  <rect x="619" y="162" width="52" height="13" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.6"/>
  <text x="645" y="172" font-family="monospace" font-size="4.5" fill="#ffffff" text-anchor="middle" opacity="0.6">RESERVAR →</text>

  <!-- Mobile: 1 card visible -->
  <line x1="609" y1="185" x2="681" y2="185" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <rect x="617" y="192" width="56" height="38" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.4"/>
  <text x="645" y="213" font-family="monospace" font-size="4.5" fill="#ffffff" text-anchor="middle" opacity="0.4">MENÚ</text>
  <text x="645" y="224" font-family="monospace" font-size="4.5" fill="#ffffff" text-anchor="middle" opacity="0.25">↓ scroll</text>

  <!-- Label -->
  <text x="645" y="278" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35" letter-spacing="3">MOBILE</text>

  <!-- Responsive label at bottom -->
  <text x="400" y="355" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.2" letter-spacing="4">FULLY RESPONSIVE DESIGN</text>
  <line x1="200" y1="362" x2="600" y2="362" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

</svg>
