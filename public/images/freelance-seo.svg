  <text x="618" y="215" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">150</text>
  <text x="662" y="88"  font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.8">360</text>

