<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">

  <!-- AI CLIENT box — top center -->
  <rect x="305" y="28" width="190" height="58" stroke="#ffffff" stroke-width="1" fill="none"/>
  <line x1="305" y1="44" x2="495" y2="44" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="400" y="40" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">CLIENT</text>
  <text x="400" y="60" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">AI CLIENT</text>
  <text x="400" y="78" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.4">claude-sonnet / gpt-4o</text>

  <!-- Vertical line from AI CLIENT down to protocol layer -->
  <line x1="400" y1="86" x2="400" y2="152" stroke="#ffffff" stroke-width="0.75" opacity="0.6"/>
  <polyline points="394,148 400,156 406,148" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.6"/>

  <!-- MCP PROTOCOL LAYER — dashed rect -->
  <rect x="80" y="158" width="640" height="54" stroke="#ffffff" stroke-width="0.75" stroke-dasharray="6 4" fill="none" opacity="0.7"/>
  <text x="400" y="179" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.4">— — — — — — — — — — — — — — — — — — — — — — — — — — — — —</text>
  <text x="400" y="194" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">MCP PROTOCOL LAYER</text>
  <text x="400" y="206" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.4">JSON-RPC 2.0 · stdio · SSE</text>

  <!-- Lines from protocol layer down to each server -->
  <!-- Left server -->
  <line x1="185" y1="212" x2="185" y2="278" stroke="#ffffff" stroke-width="0.75" opacity="0.55"/>
  <polyline points="179,274 185,282 191,274" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.55"/>
  <!-- Center server -->
  <line x1="400" y1="212" x2="400" y2="278" stroke="#ffffff" stroke-width="0.75" opacity="0.55"/>
  <polyline points="394,274 400,282 406,274" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.55"/>
  <!-- Right server -->
  <line x1="615" y1="212" x2="615" y2="278" stroke="#ffffff" stroke-width="0.75" opacity="0.55"/>
  <polyline points="609,274 615,282 621,274" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.55"/>

  <!-- Horizontal connector across protocol layer bottom at server points -->
  <line x1="185" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="212" x2="615" y2="212" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

  <!-- STORAGE MCP SERVER — left -->
  <rect x="80" y="282" width="210" height="68" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="80" y1="298" x2="290" y2="298" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="185" y="294" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">MCP SERVER · 01</text>
  <text x="185" y="316" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">STORAGE</text>
  <text x="185" y="330" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">MCP SERVER</text>
  <text x="185" y="344" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">tape · disk · archive</text>

  <!-- AUTOMATION MCP SERVER — center -->
  <rect x="295" y="282" width="210" height="68" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="295" y1="298" x2="505" y2="298" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="400" y="294" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">MCP SERVER · 02</text>
  <text x="400" y="316" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">AUTOMATION</text>
  <text x="400" y="330" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">MCP SERVER</text>
  <text x="400" y="344" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">python · workflows</text>

  <!-- REPORTING MCP SERVER — right -->
  <rect x="510" y="282" width="210" height="68" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>
  <line x1="510" y1="298" x2="720" y2="298" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="615" y="294" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">MCP SERVER · 03</text>
  <text x="615" y="316" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">REPORTING</text>
  <text x="615" y="330" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">MCP SERVER</text>
  <text x="615" y="344" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">metrics · dashboards</text>

  <!-- Small status dots on servers -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="96" cy="291" r="2.5"/>
    <circle cx="311" cy="291" r="2.5"/>
    <circle cx="526" cy="291" r="2.5"/>
  </g>

  <!-- Bottom resource labels -->
  <g opacity="0.25">
    <line x1="80" y1="368" x2="720" y2="368" stroke="#ffffff" stroke-width="0.5"/>
    <text x="185" y="382" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">PHYSICAL STORAGE</text>
    <text x="400" y="382" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">SCRIPT RUNNER</text>
    <text x="615" y="382" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">ANALYTICS API</text>
  </g>

</svg>
