<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">

  <!-- Background grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="100" cy="80"  r="1"/><circle cx="200" cy="80"  r="1"/><circle cx="300" cy="80"  r="1"/>
    <circle cx="400" cy="80"  r="1"/><circle cx="500" cy="80"  r="1"/><circle cx="600" cy="80"  r="1"/>
    <circle cx="700" cy="80"  r="1"/><circle cx="100" cy="160" r="1"/><circle cx="700" cy="160" r="1"/>
    <circle cx="100" cy="240" r="1"/><circle cx="700" cy="240" r="1"/><circle cx="100" cy="320" r="1"/>
    <circle cx="200" cy="320" r="1"/><circle cx="300" cy="320" r="1"/><circle cx="400" cy="320" r="1"/>
    <circle cx="500" cy="320" r="1"/><circle cx="600" cy="320" r="1"/><circle cx="700" cy="320" r="1"/>
  </g>

  <!-- Pipeline label -->
  <text x="400" y="45" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35" letter-spacing="3">AUTOMATION PIPELINE</text>

  <!-- Box 1 — STORAGE LIFECYCLE -->
  <rect x="28" y="158" width="162" height="84" stroke="#ffffff" stroke-width="1" fill="none"/>
  <line x1="28" y1="176" x2="190" y2="176" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="109" y="170" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">01</text>
  <text x="109" y="197" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">STORAGE</text>
  <text x="109" y="212" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">LIFECYCLE</text>
  <text x="109" y="231" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">INPUT</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="200" x2="218" y2="200" stroke="#ffffff" stroke-width="0.75" opacity="0.8"/>
  <polyline points="212,194 220,200 212,206" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>

  <!-- Box 2 — AI ANALYSIS -->
  <rect x="220" y="158" width="162" height="84" stroke="#ffffff" stroke-width="1" fill="none"/>
  <line x1="220" y1="176" x2="382" y2="176" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="301" y="170" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">02</text>
  <text x="301" y="197" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">AI</text>
  <text x="301" y="212" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">ANALYSIS</text>
  <text x="301" y="231" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">PROCESS</text>

  <!-- Arrow 2 -->
  <line x1="382" y1="200" x2="410" y2="200" stroke="#ffffff" stroke-width="0.75" opacity="0.8"/>
  <polyline points="404,194 412,200 404,206" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>

  <!-- Box 3 — PYTHON WORKFLOW ENGINE -->
  <rect x="412" y="158" width="162" height="84" stroke="#ffffff" stroke-width="1" fill="none"/>
  <line x1="412" y1="176" x2="574" y2="176" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="493" y="170" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">03</text>
  <text x="493" y="194" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">PYTHON</text>
  <text x="493" y="208" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">WORKFLOW</text>
  <text x="493" y="222" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">ENGINE</text>
  <text x="493" y="234" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">EXECUTE</text>

  <!-- Arrow 3 -->
  <line x1="574" y1="200" x2="602" y2="200" stroke="#ffffff" stroke-width="0.75" opacity="0.8"/>
  <polyline points="596,194 604,200 596,206" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.8"/>

  <!-- Box 4 — REDUCED CYCLE TIME -->
  <rect x="604" y="158" width="168" height="84" stroke="#ffffff" stroke-width="1" fill="none"/>
  <line x1="604" y1="176" x2="772" y2="176" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="688" y="170" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.45">04</text>
  <text x="688" y="197" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">REDUCED</text>
  <text x="688" y="212" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">CYCLE TIME</text>
  <text x="688" y="231" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.35">OUTPUT</text>

  <!-- Metric annotations below each box -->
  <g opacity="0.5">
    <text x="109" y="268" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">TAPE / DISK</text>
    <text x="301" y="268" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">ML MODELS</text>
    <text x="493" y="268" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">SCRIPTS</text>
    <text x="688" y="268" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">40% FASTER</text>
  </g>

  <!-- Small tick marks below metrics -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.2">
    <line x1="109" y1="272" x2="109" y2="285"/>
    <line x1="301" y1="272" x2="301" y2="285"/>
    <line x1="493" y1="272" x2="493" y2="285"/>
    <line x1="688" y1="272" x2="688" y2="285"/>
  </g>

  <!-- Bottom baseline -->
  <line x1="28" y1="290" x2="772" y2="290" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

</svg>
